{% extends 'base.html' %}
{% load static %}
{% block content %}

<section class="apply-section">
    <div class="apply-container">

        <h2 class="apply-title">
            Apply for {{ career.role }}
        </h2>

        <form method="POST" enctype="multipart/form-data" class="apply-form">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    {{ form.full_name }}
                </div>

                <div class="form-group">
                    <label>Email</label>
                    {{ form.email }}
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Mobile Number</label>
                    {{ form.mobile }}
                </div>

                <div class="form-group">
                    <label>Education Qualification</label>
                    {{ form.education }}
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Year of Passed Out</label>
                    {{ form.year_passed_out }}
                </div>

                <div class="form-group">
                    <label>Resume</label>
                    {{ form.resume }}
                </div>
            </div>

            <div class="form-group full-width">
                <label>Cover Letter</label>
                {{ form.cover_letter }}
            </div>

            <button type="submit" class="submit-btn">
                Submit Application
            </button>

        </form>

    </div>
</section>

{% endblock %}
